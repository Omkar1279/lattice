#
# Status: 20/50 queries drafted (10 symbol + 10 behavioural). The remaining
# 30 (cross-file × 10, documentation-style × 10, bug-shaped × 10) still need
# to be written before pre-registration per docs/benchmarking.md §4.
#
# ⚠ LLM-source caveat
#
# `docs/benchmarking.md §4` is explicit: "Hand-curated, not LLM-generated —
# synthetic queries inherit the LLM's blindspots and will inflate your
# numbers." This draft was produced by an LLM (Kiro on claude-opus-4-7) on
# 2026-05-25, with each ground-truth (path, symbol) pair verified against
# real source at the pinned fixture commit
# `fastapi@40e33e492dbf4af6172997f4e3238a32e56cbe26`.
#
# Grounding the answers in real code only fixes half the problem. The query
# *phrasings* are still LLM-generated, which means the ablation may
# advantage retrievers that share the LLM's tokenisation and phrasing
# habits. Before pre-registration, do at least one of:
#
#   1. Replace ≥50% of the query strings with phrasings collected from
#      real developer questions (e.g. r/FastAPI threads, Stack Overflow
#      questions tagged `fastapi`, GitHub Discussions, your own dogfood
#      week's friction log).
#   2. Have a second human (not the original drafter) rewrite each query
#      string in their own words while keeping the (path, symbol) target.
#   3. Both of the above.
#
# Anything less leaves a "your queries are model-shaped" attack vector
# open at launch. Don't ship until at least one of those happens.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Pre-registration protocol (docs/benchmarking.md §4)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#   1. Finish all 50 queries (this file is 20/50).
#   2. Apply the human-review steps above.
#   3. Commit `queries.yaml` to the repo BEFORE the first ablation run.
#   4. Tag that commit (e.g. `bench-pre-registration-v0.7-rc1`). The tag
#      is what defuses the cherry-picking accusation: anyone can `git diff`
#      and confirm the query set didn't shift after the numbers came in.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Schema
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#   id          — stable identifier (q001 … q050).
#   category    — one of: symbol | behavioural | cross_file | documentation | bug_shaped
#   query       — natural-language phrasing as a developer might ask it.
#   required    — list of {path, symbol}; ALL must appear in top-K to count.
#   acceptable  — list of {path, symbol[, note]}; additional hits that
#                 also score (re-exports, reasonable alternates).
#
# Paths are relative to the fixture-repo root (i.e. `fastapi/exceptions.py`
# resolves to `<fastapi-repo>/fastapi/exceptions.py`).
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

fixture: fastapi@40e33e492dbf4af6172997f4e3238a32e56cbe26
draft_status: v0
drafted_by: kiro/claude-opus-4-7
drafted_at: 2026-05-25
human_reviewed: false  # MUST become true before pre-registration

queries:

  # ────────────────────────────────────────────────────────────────────────
  # Category 1 — symbol lookup (10/10 drafted)
  # "where is X defined?" — direct identifier-shaped queries.
  # ────────────────────────────────────────────────────────────────────────

  - id: q001
    category: symbol
    query: "where is HTTPException defined?"
    required:
      - path: fastapi/exceptions.py
        symbol: HTTPException
    acceptable:
      - path: fastapi/__init__.py
        symbol: HTTPException
        note: re-export

  - id: q002
    category: symbol
    query: "where is the APIRouter class?"
    required:
      - path: fastapi/routing.py
        symbol: APIRouter
    acceptable:
      - path: fastapi/__init__.py
        symbol: APIRouter
        note: re-export

  - id: q003
    category: symbol
    query: "where's the FastAPI class itself defined?"
    required:
      - path: fastapi/applications.py
        symbol: FastAPI
    acceptable:
      - path: fastapi/__init__.py
        symbol: FastAPI
        note: re-export

  - id: q004
    category: symbol
    query: "show me jsonable_encoder"
    required:
      - path: fastapi/encoders.py
        symbol: jsonable_encoder

  - id: q005
    category: symbol
    query: "where is solve_dependencies defined?"
    required:
      - path: fastapi/dependencies/utils.py
        symbol: solve_dependencies

  - id: q006
    category: symbol
    query: "where is the Dependant class?"
    required:
      - path: fastapi/dependencies/models.py
        symbol: Dependant

  - id: q007
    category: symbol
    query: "find the APIRoute class"
    required:
      - path: fastapi/routing.py
        symbol: APIRoute

  - id: q008
    category: symbol
    query: "where is OAuth2PasswordBearer defined?"
    required:
      - path: fastapi/security/oauth2.py
        symbol: OAuth2PasswordBearer

  - id: q009
    category: symbol
    query: "where's RequestValidationError?"
    required:
      - path: fastapi/exceptions.py
        symbol: RequestValidationError

  - id: q010
    category: symbol
    query: "where is the Body() parameter function defined?"
    required:
      - path: fastapi/param_functions.py
        symbol: Body
    acceptable:
      - path: fastapi/params.py
        symbol: Body
        note: the Body class the function returns
      - path: fastapi/__init__.py
        symbol: Body
        note: re-export

  # ────────────────────────────────────────────────────────────────────────
  # Category 2 — behavioural (10/10 drafted)
  # "the code that does X" — natural-language descriptions of behaviour,
  # not identifier-shaped. These should NOT be findable by a pure symbol
  # pass; they exercise BM25 + semantic + freshness rerank.
  # ────────────────────────────────────────────────────────────────────────

  - id: q011
    category: behavioural
    query: "what handles 422 errors when request validation fails"
    required:
      - path: fastapi/exception_handlers.py
        symbol: request_validation_exception_handler
    acceptable:
      - path: fastapi/exceptions.py
        symbol: RequestValidationError
        note: the exception class that triggers the handler

  - id: q012
    category: behavioural
    query: "where does fastapi serialize the response from a handler"
    required:
      - path: fastapi/routing.py
        symbol: serialize_response

  - id: q013
    category: behavioural
    query: "how does fastapi actually call my endpoint function"
    required:
      - path: fastapi/routing.py
        symbol: run_endpoint_function

  - id: q014
    category: behavioural
    query: "where is the per-route request handler built"
    required:
      - path: fastapi/routing.py
        symbol: get_request_handler

  - id: q015
    category: behavioural
    query: "where Depends() actually gets resolved into values"
    required:
      - path: fastapi/dependencies/utils.py
        symbol: solve_dependencies
    acceptable:
      - path: fastapi/dependencies/utils.py
        symbol: get_dependant
        note: builds the Dependant tree that solve_dependencies walks

  - id: q016
    category: behavioural
    query: "the code that turns a pydantic model into a JSON-safe dict"
    required:
      - path: fastapi/encoders.py
        symbol: jsonable_encoder

  - id: q017
    category: behavioural
    query: "where the OpenAPI spec gets generated"
    required:
      - path: fastapi/openapi/utils.py
        symbol: get_openapi
    acceptable:
      - path: fastapi/openapi/utils.py
        symbol: get_openapi_path
        note: per-route OpenAPI generation, called by get_openapi

  - id: q018
    category: behavioural
    query: "the function that decides whether a status code (like 204) should have a response body"
    required:
      - path: fastapi/utils.py
        symbol: is_body_allowed_for_status_code

  - id: q019
    category: behavioural
    query: "how is the FastAPI app object constructed"
    required:
      - path: fastapi/applications.py
        symbol: FastAPI
    acceptable:
      - path: fastapi/applications.py
        symbol: FastAPI.__init__
        note: retrievers that report methods separately may surface the constructor

  - id: q020
    category: behavioural
    query: "what runs when I raise HTTPException in a route"
    required:
      - path: fastapi/exception_handlers.py
        symbol: http_exception_handler
    acceptable:
      - path: fastapi/exceptions.py
        symbol: HTTPException
        note: the exception class itself

  # ────────────────────────────────────────────────────────────────────────
  # Categories 3-5 — TODO before pre-registration
  # ────────────────────────────────────────────────────────────────────────
  # cross_file (10/10):    "how does X propagate through Y" style queries
  # documentation (10/10): "how do I add custom middleware" how-to phrasing
  # bug_shaped (10/10):    "the function that handles <error symptom>"
  #
  # These three categories deliberately pull on different retrieval strengths:
  #   - cross_file stresses the structural graph (recall_expand modes)
  #   - documentation stresses semantic + BM25 over docstrings
  #   - bug_shaped stresses error-message → call-site grounding
  #
  # Draft them in the same shape as queries above. Each ground-truth target
  # MUST be verified against fixture source before this file is committed
  # for pre-registration.
