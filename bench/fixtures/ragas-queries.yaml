# bench/fixtures/ragas-queries.yaml — RAGAS triad evaluation fixture
#
# Each query has:
#   - query: the natural-language question
#   - expected_chunks: chunk IDs that SHOULD be retrieved
#   - retrieved_chunks: simulated retrieval results as {id, body} pairs
#     (id is matched against expected_chunks for context_precision;
#      body is tokenised for faithfulness and answer_relevance)
#   - answer: simulated answer text for faithfulness/relevance scoring
#
# Distractor IDs are kept in retrieved_chunks so precision lands realistically
# between 0 (broken) and 1.0 (curated), giving the metric room to move when
# the cascade actually changes.

queries:
  - query: "where is HTTPException defined?"
    expected_chunks:
      - "fastapi/exceptions.py::HTTPException"
      - "fastapi/__init__.py::HTTPException"
    retrieved_chunks:
      - id: "fastapi/exceptions.py::HTTPException"
        body: "class HTTPException(StarletteHTTPException): def __init__(self, status_code, detail=None, headers=None)"
      - id: "fastapi/__init__.py::HTTPException"
        body: "from fastapi.exceptions import HTTPException"
      - id: "starlette/exceptions.py::StarletteHTTPException"
        body: "from starlette.exceptions import HTTPException as StarletteHTTPException"
    answer: "HTTPException is defined in fastapi/exceptions.py. It extends StarletteHTTPException with an optional headers parameter."

  - query: "how does the retrieval cascade work?"
    expected_chunks:
      - "src/retrieval/cascade.ts::runCascade"
      - "src/retrieval/bm25.ts::searchFts"
    retrieved_chunks:
      - id: "src/retrieval/cascade.ts::runCascade"
        body: "export async function runCascade(vault, args) runs a four-stage cascade: symbol exact match, BM25, semantic, RRF fusion"
      - id: "src/retrieval/bm25.ts::searchFts"
        body: "BM25 search uses FTS5 with rank function for term frequency scoring"
      - id: "src/retrieval/freshness.ts::freshnessScore"
        body: "freshness score applies exponential decay to older chunks"
    answer: "The retrieval cascade in cascade.ts runs four stages: symbol exact match for identifiers, BM25 via FTS5, optional semantic search, then RRF fusion with freshness reranking."

  - query: "what is the token budget enforcement mechanism?"
    expected_chunks:
      - "src/util/tokens.ts::countTokens"
      - "src/util/tokens.ts::truncateToBudget"
    retrieved_chunks:
      - id: "src/util/tokens.ts::countTokens"
        body: "export function countTokens(s: string): number uses anthropic tokenizer with CLAUDE4_TOKENIZER_CORRECTION factor of 1.78"
      - id: "src/util/tokens.ts::truncateToBudget"
        body: "export function truncateToBudget(s, budget) binary searches for longest prefix fitting budget"
      - id: "src/storage/vault.ts::initSchema"
        body: "unrelated chunk about database schema"
    answer: "Token budget is enforced by countTokens which applies a 1.78 correction factor to the Claude-1 BPE tokenizer, and truncateToBudget which binary-searches for the longest prefix."

  - query: "how are notes persisted to disk?"
    expected_chunks:
      - "src/storage/vault.ts::writeNote"
    retrieved_chunks:
      - id: "src/storage/vault.ts::writeNote"
        body: "writeNote persists an atomic note as markdown in .lattice/notes/ with frontmatter tags and timestamps"
      - id: "src/storage/vault.ts::initSchema"
        body: "the SQLite index is updated via FTS5 triggers on INSERT"
    answer: "Notes are written as markdown files in .lattice/notes/ with YAML frontmatter. The SQLite FTS5 index is kept in sync via triggers."

  - query: "where does tree-sitter symbol extraction happen?"
    expected_chunks:
      - "src/retrieval/symbol.ts::lookupSymbol"
      - "src/indexer/indexer.ts::reindexRepo"
    retrieved_chunks:
      - id: "src/retrieval/symbol.ts::lookupSymbol"
        body: "lookupSymbol queries the symbols table for exact identifier matches"
      - id: "src/indexer/indexer.ts::reindexRepo"
        body: "reindexRepo walks the repo and extracts symbols via tree-sitter for five languages"
      - id: "src/storage/vault.ts::initSchema"
        body: "symbols table stores exported names with file path and position"
    answer: "Tree-sitter symbol extraction happens in the indexer during reindexRepo, storing results in the symbols table. lookupSymbol in symbol.ts queries that table."

  - query: "what happens during session start hook?"
    expected_chunks:
      - "hooks/session-start.js"
    retrieved_chunks:
      - id: "hooks/session-start.js"
        body: "session-start.js injects a 300-token summary with behavioral instructions and chunk count"
      - id: "hooks/stop.js"
        body: "the hook reads .lattice/notes/_summary.md if it exists"
    answer: "The session-start hook injects up to 400 tokens of priming including behavioral instructions, chunk count, and a summary from _summary.md."

  - query: "how does freshness decay work?"
    expected_chunks:
      - "src/retrieval/freshness.ts::freshnessScore"
    retrieved_chunks:
      - id: "src/retrieval/freshness.ts::freshnessScore"
        body: "freshnessScore applies exponential decay based on age with source-weighted multipliers"
      - id: "src/retrieval/freshness.ts::SOURCE_WEIGHT"
        body: "human_note source gets weight 0.9, code_index gets 1.0, auto_capture gets 0.6"
      - id: "bin/lattice.js::main"
        body: "unrelated chunk about CLI commands"
    answer: "Freshness uses exponential decay multiplied by source weight. code_index has weight 1.0 (no decay), human_note 0.9 (180d half-life), auto_capture 0.6 (30d)."

  - query: "explain the supersedes mechanism"
    expected_chunks:
      - "src/storage/vault.ts::writeNote"
      - "test/supersedes.test.ts"
    retrieved_chunks:
      - id: "src/storage/vault.ts::writeNote"
        body: "writeNote accepts a supersedes parameter that marks the old chunk as superseded_by the new one"
      - id: "src/storage/vault.ts::getChunk"
        body: "getChunk filters out superseded chunks; getChunkRaw does not"
    answer: "When writing a note with supersedes, the old chunk gets a superseded_by link. getChunk hides superseded chunks from normal retrieval while getChunkRaw still surfaces them."

  - query: "what MCP tools does lattice expose?"
    expected_chunks:
      - "src/tools/recall.ts"
      - "src/tools/recall_expand.ts"
      - "src/tools/write.ts"
    retrieved_chunks:
      - id: "src/tools/recall.ts"
        body: "lattice exposes 3 MCP tools: recall, recall_expand, and write"
      - id: "src/tools/recall.ts::handleRecall"
        body: "recall does hybrid retrieval with budget enforcement"
      - id: "src/tools/recall_expand.ts"
        body: "recall_expand walks the code graph one hop"
      - id: "src/tools/write.ts"
        body: "write persists atomic notes with optional supersedes"
    answer: "Lattice exposes exactly 3 MCP tools: recall for hybrid retrieval, recall_expand for structural graph traversal, and write for persisting notes."

  - query: "how does the pre-tool-use hook block reads?"
    expected_chunks:
      - "hooks/pre-tool-use.js"
    retrieved_chunks:
      - id: "hooks/pre-tool-use.js"
        body: "pre-tool-use checks if a file is indexed and larger than 5K chars, then returns permissionDecision deny"
      - id: "hooks/pre-tool-use.js::denyReason"
        body: "the deny reason tells the model to use recall_expand instead"
      - id: "hooks/post-tool-use.js"
        body: "targeted reads with offset+limit under 50 lines are allowed through"
    answer: "The pre-tool-use hook blocks full-file reads of indexed files over 5K chars by returning permissionDecision:deny, directing the model to use recall_expand instead."
